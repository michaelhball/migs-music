# Auto-build a release on every `vX.Y.Z` tag push.
#
# Triggered by: `git tag v0.2.0 && git push --tags` (typically via `./release.sh 0.2.0 --tag`).
#
# What this does:
#   1. Builds a signed APK + AAB.
#   2. Attaches both to the GitHub Release for that tag (creates the release if missing).
#   3. If the optional PLAY_SERVICE_ACCOUNT_JSON secret is set, also uploads the AAB to the
#      Play Store **Internal testing** track. Internal track is invitation-only (your testers
#      by email), no Google review, instant rollout. Promotion to closed/open/production
#      tracks is still a manual click in the Play Console — by design, so a one-line bug
#      can't ship to everyone unattended.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#
#   ALWAYS REQUIRED — for signing:
#     KEYSTORE_BASE64       base64-encoded release-keystore.jks
#     KEYSTORE_PASSWORD     keystore password
#     KEY_ALIAS             key alias inside the keystore
#     KEY_PASSWORD          key password
#
#   OPTIONAL — for Play Store auto-upload:
#     PLAY_SERVICE_ACCOUNT_JSON  full JSON contents of the Google Cloud service account
#                                key with Play Developer API + "Release manager" role
#                                granted in the Play Console.
#
# When PLAY_SERVICE_ACCOUNT_JSON is unset (e.g. before Play Console is configured), the
# Play upload step is skipped silently — the GitHub release still publishes.
#
# Setup steps for the Play Store upload (one-time): see RELEASING.md.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # so the workflow can attach the .apk + .aab to the GitHub Release.

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed APK + AAB
        # APK is what most users sideload via the Releases page; AAB is what the
        # Play Store wants. Building both means the release artefact set covers
        # either install path without a second workflow run.
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Attach APK + AAB to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_PATH=app/build/outputs/apk/release/app-release.apk
          AAB_PATH=app/build/outputs/bundle/release/app-release.aab
          APK_RENAMED="migs-music-${VERSION}.apk"
          AAB_RENAMED="migs-music-${VERSION}.aab"
          cp "$APK_PATH" "$APK_RENAMED"
          cp "$AAB_PATH" "$AAB_RENAMED"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" "$APK_RENAMED" "$AAB_RENAMED" --clobber
          else
            gh release create "v${VERSION}" "$APK_RENAMED" "$AAB_RENAMED" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}. See commit log for changes."
          fi

      # Pre-check: GitHub Actions doesn't expose secrets to step `if:` conditions
      # directly. The pattern is to promote the secret to env first, then check
      # that the env var is non-empty in a subsequent step's condition.
      - name: Check if Play Store upload is configured
        id: play_check
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "$PLAY_SERVICE_ACCOUNT_JSON" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Play Store upload not configured (PLAY_SERVICE_ACCOUNT_JSON secret unset). Skipping."
          fi

      - name: Upload AAB to Play Store Internal track
        if: steps.play_check.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          # The service account's credentials. Plain-text-JSON form, not a path —
          # the action writes it to a temp file internally.
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.migsmusic
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          # `internal` = invite-only testers, instant rollout, no Google review.
          # Promotion to closed/open/production tracks is a manual click in the
          # Play Console — kept manual on purpose so a one-line bug can't escape
          # to all users without a human checkpoint.
          track: internal
          # `completed` = visible to internal testers immediately. `draft` would
          # require us to flip it to "release" in the Play Console manually.
          status: completed
          # Roll out to 100% of internal testers. (Staged rollout makes more sense
          # for production track; for internal it's all-or-nothing anyway.)
          inAppUpdatePriority: 2
