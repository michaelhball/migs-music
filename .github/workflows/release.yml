# Auto-build a release .aab when a `vX.Y.Z` tag is pushed.
#
# Triggered by: `git tag v0.2.0 && git push --tags` (typically via `./release.sh 0.2.0 --tag`).
# Builds a signed Android App Bundle and attaches it to the GitHub Release for that tag.
#
# Doesn't upload to Play Console — that's a separate step the developer does manually for now,
# until the Google Play Developer API service account is wired up. The .aab attached to the
# Release page is the same file you'd upload manually.
#
# Requires GitHub Secrets to be configured:
#   - KEYSTORE_BASE64           base64-encoded contents of the release keystore .jks
#   - KEYSTORE_PASSWORD         keystore password
#   - KEY_ALIAS                 key alias inside the keystore
#   - KEY_PASSWORD              key password
#
# Set these via the repo's Settings → Secrets and variables → Actions. Encode the keystore:
#   base64 -i ~/migs-music-release.jks | pbcopy

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # so the workflow can attach the .aab to the GitHub Release.

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Write keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$RUNNER_TEMP/release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed APK + AAB
        # APK is what most users sideload via the Releases page; AAB is what the
        # Play Store wants if/when we publish there. Building both means the
        # release artefact set covers either path without a second workflow run.
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Attach APK + AAB to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK_PATH=app/build/outputs/apk/release/app-release.apk
          AAB_PATH=app/build/outputs/bundle/release/app-release.aab
          APK_RENAMED="migs-music-${VERSION}.apk"
          AAB_RENAMED="migs-music-${VERSION}.aab"
          cp "$APK_PATH" "$APK_RENAMED"
          cp "$AAB_PATH" "$AAB_RENAMED"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            gh release upload "v${VERSION}" "$APK_RENAMED" "$AAB_RENAMED" --clobber
          else
            gh release create "v${VERSION}" "$APK_RENAMED" "$AAB_RENAMED" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}. See commit log for changes."
          fi
