name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint, compile, unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Reject large files
        # Anything over 5 MB is almost certainly a build artefact, screen capture, or audio
        # file that shouldn't live in source. Catches accidental commits early.
        run: |
          set -euo pipefail
          large=$(find . \
            -type f \
            -not -path './.git/*' \
            -size +5M \
            -print)
          if [ -n "$large" ]; then
            echo "::error::Large files (> 5 MB) detected:"
            echo "$large"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew --no-daemon ktlintCheck

      - name: Compile (debug)
        run: ./gradlew --no-daemon :app:compileDebugKotlin

      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            app/build/reports/ktlint/
          if-no-files-found: ignore
          retention-days: 7
