<svg viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <!--
    Play Store feature graphic — 1024x500. Composition: the actual launcher
    icon (full citrus square card, paths copied verbatim from _CHOSEN-current.svg)
    on the left, "migs music" wordmark on the right. No taglines — keeps the
    composition uncluttered and lets the icon do the talking.
  -->
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <radialGradient id="pageGloss" cx="0.7" cy="0.0" r="0.9">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Below: identical defs to _CHOSEN-current.svg so the icon card matches
         the launcher icon byte-for-byte. -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="innerEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B21B6" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="iconGloss" cx="0.3" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="figureShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1024" height="500" fill="url(#page)"/>
  <rect width="1024" height="500" fill="url(#pageGloss)"/>

  <!-- Launcher icon card on the left.
       Source icon viewBox is 0 0 512 512 → scale to 400x400 → 0.78125.
       Position so the card is vertically centred (y = 50..450). -->
  <g transform="translate(50 50)" filter="url(#cardShadow)">
    <g transform="scale(0.78125)">
      <!-- Card background — same gradient + radius as the launcher icon. -->
      <rect width="512" height="512" rx="115" fill="url(#iconBg)"/>
      <rect width="512" height="512" rx="115" fill="url(#iconGloss)"/>

      <!-- Figure — identical to _CHOSEN-current.svg lines 36..44. -->
      <g filter="url(#figureShadow)">
        <path d="M 200 90 Q 290 50 395 125 L 405 160 Q 295 80 215 125 Z" fill="url(#figure)"/>
        <path d="M 215 335 Q 175 230 195 110 Q 205 75 230 75 Q 252 82 250 130 Q 248 230 248 335 Z" fill="url(#figure)"/>
        <path d="M 222 300 Q 205 220 218 130 Q 222 105 232 108 Q 240 120 238 145 Q 236 230 236 300 Z" fill="url(#innerEar)"/>
        <path d="M 388 350 Q 410 250 400 160 Q 395 120 372 122 Q 352 130 358 175 Q 365 250 360 350 Z" fill="url(#figure)"/>
        <path d="M 385 320 Q 400 250 392 165 Q 388 140 378 142 Q 370 150 372 180 Q 376 250 372 320 Z" fill="url(#innerEar)"/>
        <ellipse cx="180" cy="370" rx="72" ry="56" fill="url(#figure)" transform="rotate(-18 180 370)"/>
        <ellipse cx="155" cy="352" rx="40" ry="28" fill="url(#iconGloss)" transform="rotate(-18 155 352)"/>
        <ellipse cx="350" cy="385" rx="58" ry="44" fill="url(#figure)" transform="rotate(-18 350 385)"/>
        <ellipse cx="332" cy="370" rx="32" ry="22" fill="url(#iconGloss)" transform="rotate(-18 332 370)"/>
      </g>
    </g>
  </g>

  <!-- Wordmark only. Centred vertically against the icon card (icon centre at y≈250).
       Sized so the wordmark fits with comfortable right-margin even when rsvg
       falls back to a wider font than the requested system font. -->
  <text x="500" y="280"
        font-family="Helvetica, Arial, sans-serif"
        font-size="96" font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-1">migs music</text>
</svg>
