<svg viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!--
    Play Store feature graphic — 1024x500.
    Composition: the actual launcher icon (full citrus square card) on the left
    against a complementary background, two-line wordmark + tagline on the right.
    No fine text or critical UI in the centre — Play crops the centre when used
    as a banner on smaller surfaces.
  -->
  <defs>
    <!-- Page background: the same yellow→orange→red gradient as the icon, but
         angled differently so the icon card reads as a distinct surface on top. -->
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="60%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <radialGradient id="pageGloss" cx="0.7" cy="0.0" r="0.9">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Embedded launcher icon. Reference _CHOSEN-current.svg's gradients verbatim
         so the card matches what users see on their home screen. -->
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="50%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="innerEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5B21B6" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#5B21B6" stop-opacity="0.10"/>
    </linearGradient>
    <radialGradient id="iconGloss" cx="0.3" cy="0.25" r="0.55">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.40"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="1024" height="500" fill="url(#page)"/>
  <rect width="1024" height="500" fill="url(#pageGloss)"/>

  <!-- Launcher icon card on the left.
       370x370, vertical centre at y=250, so y=65..435.
       512→370 scale = 0.7227. -->
  <g transform="translate(60 65)" filter="url(#cardShadow)">
    <g transform="scale(0.7227)">
      <!-- Rounded-square background (rx ~92 matches the icon SVG). -->
      <rect x="0" y="0" width="512" height="512" rx="92" ry="92" fill="url(#iconBg)"/>
      <rect x="0" y="0" width="512" height="512" rx="92" ry="92" fill="url(#iconGloss)"/>
      <!-- Note-head pair, rotated -18° (matches icon). -->
      <g transform="translate(180 360) rotate(-18)">
        <ellipse cx="-50" cy="0" rx="72" ry="56" fill="url(#figure)"/>
        <ellipse cx="80" cy="-12" rx="58" ry="44" fill="url(#figure)"/>
      </g>
      <!-- Stems / ears -->
      <path d="M 138 350
               C 120 220, 110 110, 145 30
               C 165 -10, 200 -10, 220 30
               C 235 110, 220 230, 200 350 Z"
            fill="url(#figure)"/>
      <path d="M 248 350
               C 230 230, 222 130, 250 60
               C 268 28, 300 28, 318 60
               C 340 140, 328 240, 308 350 Z"
            fill="url(#figure)"/>
      <!-- Inner-ear hint -->
      <path d="M 165 280
               C 158 200, 158 130, 178 70
               C 192 50, 208 50, 220 75
               C 230 150, 222 230, 210 295 Z"
            fill="url(#innerEar)"/>
      <path d="M 270 295
               C 260 220, 258 145, 275 90
               C 288 70, 305 70, 318 95
               C 332 160, 322 235, 308 305 Z"
            fill="url(#innerEar)"/>
      <!-- Top beam -->
      <path d="M 145 30
               C 200 8, 280 8, 320 60
               C 320 90, 300 90, 280 75
               C 230 50, 175 60, 155 70 Z"
            fill="url(#figure)"/>
    </g>
  </g>

  <!-- Wordmark + tagline. Right column starts at x=480.
       Sized so the wordmark fits with comfortable right-margin even when rsvg
       falls back to a wider font than the requested system font. -->
  <g transform="translate(480 0)">
    <text x="0" y="220"
          font-family="Helvetica, Arial, sans-serif"
          font-size="92" font-weight="700"
          fill="#FFFFFF"
          letter-spacing="-1">migs music</text>

    <!-- Slim white underline that hints at a playback-progress bar. -->
    <rect x="0" y="240" width="220" height="5" rx="2.5" fill="#FFFFFF" opacity="0.9"/>

    <text x="0" y="305"
          font-family="Helvetica, Arial, sans-serif"
          font-size="34" font-weight="500"
          fill="#FFFFFF" opacity="0.95">local. private. fast.</text>
    <text x="0" y="350"
          font-family="Helvetica, Arial, sans-serif"
          font-size="24" font-weight="400"
          fill="#FFFFFF" opacity="0.85">your music, your phone, no cloud</text>
  </g>
</svg>
